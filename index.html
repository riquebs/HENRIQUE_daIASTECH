<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASTECH - Painel de Controle</title>
    <style>
        /* Estilos globais para garantir a estrutura correta da página */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1; /* Empurra o rodapé para a parte inferior da tela */
        }
    </style>
</head>
<body>

    <div id="header-container"></div>
    <main id="body-container"></main>
    <div id="footer-container"></div>

    <script>
        // Função responsável por buscar e injetar o HTML dos arquivos separados
        async function loadComponent(elementId, filePath) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error(`Erro ao carregar o arquivo: ${filePath}`);
                
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;

                // Executa os scripts internos do body se ele for o elemento carregado
                if (elementId === 'body-container') {
                    executeScripts(document.getElementById(elementId));
                }
            } catch (error) {
                console.error("Falha na montagem do componente:", error);
                document.getElementById(elementId).innerHTML = `<p style="padding: 20px; color: red; text-align: center;">Erro ao carregar o componente ${filePath}. Verifique se o arquivo existe na pasta.</p>`;
            }
        }

        // Garante a ativação de códigos JavaScript que venham de dentro do body.html
        function executeScripts(container) {
            const scripts = container.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        // Executa o carregamento de todos os três arquivos em paralelo ao abrir a página
        window.onload = function() {
            loadComponent('header-container', 'header.html');
            loadComponent('body-container', 'body.html');
            loadComponent('footer-container', 'footer.html'); // Carregamento do rodapé garantido aqui
        };
    </script>
</body>
</html>
